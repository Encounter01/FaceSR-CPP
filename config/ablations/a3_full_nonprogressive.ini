# FaceSR ablation A3: L1 + VGG + GAN from epoch 0.

[data]
train_hr_dir = data/train/hr
train_lr_dir =
val_hr_dir = data/val/hr
val_lr_dir =
hr_size = 256
lr_size = 64
scale = 4

[training]
batch_size = 12
num_epochs = 300
num_workers = 4
lr_g = 0.0002
lr_d = 0.0002
phase1_epochs = 0
phase2_epochs = 0

[loss]
pixel_weight = 1.0
perceptual_weight = 1.0
gan_weight = 0.1
pixel_type = l1
gan_type = vanilla
frequency_weight = 0.0
gradient_weight = 0.0
r1_weight = 0.0

[output]
checkpoint_dir = checkpoints_ablation/a3_full_nonprogressive
result_dir = results/ablation_runs/a3_full_nonprogressive
save_interval = 10
val_interval = 5
log_interval = 100

[model]
vgg_weights_path = models/vgg19_features.pt
use_attention = false
use_spectral_norm = false

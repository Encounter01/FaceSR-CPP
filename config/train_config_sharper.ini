# ============================================================================
# FaceSR sharper preset
#
# Goal:
#   Reduce oversmoothing and recover stronger facial edges/details.
#   This preset keeps reconstruction stability, but gives more weight to
#   perceptual sharpness than the default train_config.ini.
#
# Recommended checkpoint for current inference baseline:
#   checkpoints/legacy/generator_epoch190.pt
# ============================================================================

[data]
train_hr_dir = data/train/hr
train_lr_dir =
val_hr_dir = data/val/hr
val_lr_dir =
hr_size = 256
lr_size = 64
scale = 4

[training]
batch_size = 12
num_epochs = 120
num_workers = 4
lr_g = 0.0001
lr_d = 0.0001
# Epoch 0-19: pixel/frequency/gradient focused warmup
phase1_epochs = 20
# Epoch 20-49: add perceptual loss
phase2_epochs = 50

[loss]
pixel_weight = 1.0
perceptual_weight = 1.0
gan_weight = 0.05
pixel_type = l1
gan_type = hinge
frequency_weight = 0.1
gradient_weight = 0.1
r1_weight = 10.0

[output]
checkpoint_dir = checkpoints_sharper
result_dir = results_sharper
save_interval = 5
val_interval = 5
log_interval = 50

[model]
vgg_weights_path = models/vgg19_features.pt
use_attention = true
use_spectral_norm = true

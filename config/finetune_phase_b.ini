# ============================================================================
# 微调阶段B: + Perceptual (Epoch 20-49)
# 目的: 加入感知损失，学习纹理和结构特征
# ============================================================================

[data]
train_hr_dir = data/train/hr
train_lr_dir =
val_hr_dir = data/val/hr
val_lr_dir =
hr_size = 256
lr_size = 64
scale = 4

[training]
batch_size = 32
num_epochs = 30
num_workers = 8
lr_g = 0.00005
lr_d = 0.00005
# 阶段B全程使用像素+感知损失（不启用GAN）
phase1_epochs = 0
phase2_epochs = 30

[loss]
pixel_weight = 1.0
perceptual_weight = 1.0
gan_weight = 0.05
pixel_type = l1
gan_type = hinge
frequency_weight = 0.1
gradient_weight = 0.1
r1_weight = 10.0

[output]
checkpoint_dir = checkpoints
result_dir = results
save_interval = 5
val_interval = 5
log_interval = 50

[model]
vgg_weights_path = models/vgg19_features.pt
use_attention = true
use_spectral_norm = true

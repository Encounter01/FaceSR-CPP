# ============================================================================
# 微调阶段C: + GAN(hinge) + R1 (Epoch 50-99)
# 目的: 加入GAN对抗训练，生成真实感面部细节
# 使用hinge loss + spectral norm + R1正则化 确保训练稳定
# ============================================================================

[data]
train_hr_dir = data/train/hr
train_lr_dir =
val_hr_dir = data/val/hr
val_lr_dir =
hr_size = 256
lr_size = 64
scale = 4

[training]
batch_size = 32
num_epochs = 50
num_workers = 8
lr_g = 0.00002
lr_d = 0.00002
# 阶段C全程启用完整GAN训练
phase1_epochs = 0
phase2_epochs = 0

[loss]
pixel_weight = 1.0
perceptual_weight = 1.0
gan_weight = 0.05
pixel_type = l1
gan_type = hinge
frequency_weight = 0.1
gradient_weight = 0.1
r1_weight = 10.0

[output]
checkpoint_dir = checkpoints
result_dir = results
save_interval = 5
val_interval = 5
log_interval = 50

[model]
vgg_weights_path = models/vgg19_features.pt
use_attention = true
use_spectral_norm = true

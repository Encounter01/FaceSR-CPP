# ============================================================================
# 微调阶段A: Pixel + Frequency + Gradient (Epoch 0-19)
# 目的: 在新损失函数指导下重新调整基础重建能力
# ============================================================================

[data]
train_hr_dir = data/train/hr
train_lr_dir =
val_hr_dir = data/val/hr
val_lr_dir =
hr_size = 256
lr_size = 64
scale = 4

[training]
batch_size = 32
num_epochs = 20
num_workers = 8
lr_g = 0.0001
lr_d = 0.0001
# 阶段A全程只用像素级损失（含频域+梯度）
phase1_epochs = 20
phase2_epochs = 20

[loss]
pixel_weight = 1.0
perceptual_weight = 1.0
gan_weight = 0.05
pixel_type = l1
gan_type = hinge
frequency_weight = 0.1
gradient_weight = 0.1
r1_weight = 10.0

[output]
checkpoint_dir = checkpoints
result_dir = results
save_interval = 5
val_interval = 5
log_interval = 50

[model]
vgg_weights_path = models/vgg19_features.pt
use_attention = true
use_spectral_norm = true

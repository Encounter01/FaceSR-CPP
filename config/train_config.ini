# FaceSR Training Configuration
# 人脸超分辨率训练配置文件

[data]
# 训练数据目录 (HR为必需, LR可选 — 若LR目录为空则自动bicubic降采样生成)
train_hr_dir = data/train/HR
train_lr_dir = data/train/LR

# 验证数据目录
val_hr_dir = data/val/HR
val_lr_dir = data/val/LR

# 图像尺寸
hr_size = 256
lr_size = 64
scale = 4

[training]
# 训练参数 (已针对 FFHQ 70000 张数据量调整)
batch_size = 4
num_epochs = 200
num_workers = 4

# 学习率
lr_g = 0.0002
lr_d = 0.0002

# 阶段训练边界 (epoch)
# 阶段1: 仅像素损失 (0 - phase1_epochs)
# 阶段2: 像素+感知损失 (phase1_epochs - phase2_epochs)
# 阶段3: 全部损失 (phase2_epochs - num_epochs)
phase1_epochs = 30
phase2_epochs = 80

# 学习率调度器
# lr_scheduler: cosine(余弦退火), step(固定步长衰减), multistep(多步衰减), none(固定)
lr_scheduler = cosine
lr_min = 1e-7
lr_warmup_epochs = 0
# 以下仅step/multistep模式使用
lr_decay_gamma = 0.5
lr_decay_step = 50

[loss]
# 损失权重
pixel_weight = 1.0
perceptual_weight = 1.0
gan_weight = 0.1

# 损失类型
# pixel_type: l1, l2
pixel_type = l1

# gan_type: vanilla, lsgan, wgan, wgan-gp, hinge
gan_type = vanilla

[device]
# 设备模式: auto, hybrid, gpu, cpu
#   auto   - 自动检测, 有GPU时使用混合模式
#   hybrid - GPU+CPU混合模式 (推荐, 最大化硬件利用率)
#            GPU: 模型前向/反向传播, 参数更新
#            CPU: 数据加载, 预处理, 数据增强 (多线程)
#   gpu    - 仅GPU模式
#   cpu    - 仅CPU模式
device_type = auto

# pin_memory: 启用后将数据加载到锁页内存, 加速CPU→GPU传输
# 仅在hybrid/gpu模式下有效
pin_memory = true

[output]
# 输出目录
checkpoint_dir = checkpoints
result_dir = results

# 保存间隔
save_interval = 10
latest_save_interval = 1
val_interval = 2
log_interval = 100
auto_resume = true

[model]
# VGG预训练权重路径 (用于感知损失)
vgg_weights =

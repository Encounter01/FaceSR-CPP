# ============================================================================
# FaceSR 训练配置文件
#
# 格式: INI文件 ([节名] + key = value)
# 注释以 # 或 ; 开头
# ============================================================================

# [data] 节 — 数据路径和图像尺寸配置
[data]
# 训练集高分辨率(HR)图像目录，包含256x256的人脸图像
train_hr_dir = data/train/hr
# 训练集低分辨率(LR)图像目录（可选）
# 为空时会在线对HR图像做双三次下采样生成LR
train_lr_dir =
# 验证集HR/LR目录
val_hr_dir = data/val/hr
val_lr_dir =
# HR图像目标尺寸（像素）
hr_size = 256
# LR图像目标尺寸（像素）
lr_size = 64
# 超分辨率放大倍数: lr_size * scale = hr_size
scale = 4

# [training] 节 — 训练超参数
[training]
# 批量大小: 每次训练迭代处理的图像数量
# 受GPU显存限制，12张256x256图像约需8GB显存
batch_size = 12
# 总训练轮数
num_epochs = 300
# 数据加载工作线程数（建议设为CPU核心数）
num_workers = 4
# 生成器学习率 (Adam优化器)
# 2e-4 是Adam的常用初始学习率
lr_g = 0.0002
# 判别器学习率 (通常与生成器相同)
lr_d = 0.0002
# 阶段1结束epoch: 0-49轮仅使用像素损失(L1)
# 此阶段生成器学习基本的像素级映射关系
phase1_epochs = 50
# 阶段2结束epoch: 50-149轮使用像素+感知损失
# 此阶段生成器学习纹理和结构特征
phase2_epochs = 150
# 阶段3: 150-299轮使用完整GAN训练(像素+感知+对抗)
# 此阶段生成器学习生成逼真的高频细节

# [loss] 节 — 损失函数配置
[loss]
# 像素损失权重（主损失，始终启用）
pixel_weight = 1.0
# 感知损失权重（阶段2起启用）
perceptual_weight = 1.0
# GAN对抗损失权重（阶段3起启用）
# 设为较小值(0.1)以稳定训练，防止模式坍塌
gan_weight = 0.1
# 像素损失类型: l1(绝对值损失) 或 l2(均方误差)
# L1对异常值更鲁棒，通常产生更锐利的结果
pixel_type = l1
# GAN类型: vanilla(BCE) / lsgan(MSE) / wgan / wgan_gp / hinge
gan_type = vanilla
# FFT频域损失权重（0=禁用，建议0.1）
# 强制保留高频细节（边缘、纹理）
frequency_weight = 0.0
# 图像梯度损失权重（0=禁用，建议0.1）
# 保护边缘锐度
gradient_weight = 0.0
# R1梯度惩罚权重（0=禁用，建议10.0）
# 正则化判别器，防止GAN训练不稳定
r1_weight = 0.0

# [output] 节 — 输出和日志配置
[output]
# 模型权重保存目录
checkpoint_dir = checkpoints
# 验证结果图像保存目录
result_dir = results
# 检查点保存间隔（每N个epoch保存一次）
save_interval = 10
# 验证间隔（每N个epoch验证一次）
val_interval = 5
# 日志打印间隔（每N个训练步打印一次）
log_interval = 100

# [model] 节 — 模型配置
[model]
# VGG19预训练权重路径（感知损失需要）
# 为空时VGG使用随机初始化（效果较差，建议提供预训练权重）
vgg_weights_path =
# 是否启用CBAM注意力模块（在RRDB body后插入，聚焦面部关键区域）
use_attention = false
# 是否在判别器中使用谱归一化替换BatchNorm（稳定GAN训练）
use_spectral_norm = false
